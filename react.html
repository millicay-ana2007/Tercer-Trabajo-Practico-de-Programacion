<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - React CDN</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ff6994; padding: 10px; text-align: center; }
        th { background-color: #ff9ebb; }
        .formulario { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-volver { display: inline-block; margin-bottom: 20px; color: #b76bff; text-decoration: none; }
    </style>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
    <a href="index.html" class="btn-volver">← Volver al Inicio</a>
    
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [nombre, setNombre] = React.useState('');
            const [apellido, setApellido] = React.useState('');
            const [edad, setEdad] = React.useState('');
            const [altura, setAltura] = React.useState('');
            const [peso, setPeso] = React.useState('');

            const manejarSubmit = (e) => {
                e.preventDefault();
                console.log({ nombre, apellido, edad, altura, peso });
                
                setNombre(''); setApellido(''); setEdad(''); setAltura(''); setPeso('');
            };

            return (
                <div>
                    <h2>Carga de Personas (React)</h2>

                    <form onSubmit={manejarSubmit} style={{ display: 'flex', gap: '10px', marginBottom: '20px', flexWrap: 'wrap' }}>
                        <input type="text" placeholder="Nombre" required value={nombre} onChange={(e) => setNombre(e.target.value)} />
                        <input type="text" placeholder="Apellido" required value={apellido} onChange={(e) => setApellido(e.target.value)} />
                        <input type="number" placeholder="Edad" required min="1" value={edad} onChange={(e) => setEdad(e.target.value)} />
                        <input type="number" placeholder="Altura (ej: 1.75)" step="0.01" required value={altura} onChange={(e) => setAltura(e.target.value)} />
                        <input type="number" placeholder="Peso (kg)" required step="0.1" value={peso} onChange={(e) => setPeso(e.target.value)} />
                        <button type="submit">Agregar Persona</button>
                    </form>

                    <table style={{ width: '100%', borderCollapse: 'collapse', marginTop: '20px' }}>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Edad</th>
                                <th>Altura (m)</th>
                                <th>Peso (kg)</th>
                                <th>IMC</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
