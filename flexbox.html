<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1 - Flexbox</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .header { margin-bottom: 20px; }

        #contenedor-tarjetas {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .tarjeta {
            flex: 1 1 250px;
            max-width: 300px;
            border: 1px solid #ff6994;
            border-radius: 8px;
            padding: 16px;
            background-color: #ff9ebb;
            text-align: center;
        }
