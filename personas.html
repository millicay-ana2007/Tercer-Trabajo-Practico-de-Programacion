<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2 - JS Vainilla</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ff6994; padding: 10px; text-align: center; }
        th { background-color: #ff9ebb; }
        .formulario { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-volver { display: inline-block; margin-bottom: 20px; color: #b76bff; text-decoration: none; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-volver">← Volver al Inicio</a>
    <h2>Carga de Personas (JavaScript Puro)</h2>

    <form id="form-personas" class="formulario">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="text" id="apellido" placeholder="Apellido" required>
        <input type="number" id="edad" placeholder="Edad" required min="1">
        <input type="number" id="altura" placeholder="Altura (ej: 1.75)" step="0.01" required>
        <input type="number" id="peso" placeholder="Peso (kg)" required step="0.1">
        <button type="submit">Agregar Persona</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Altura (m)</th>
                <th>Peso (kg)</th>
                <th>IMC</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            </tbody>
    </table>

    <script>
        const form = document.getElementById('form-personas');
        const cuerpoTabla = document.getElementById('cuerpo-tabla');
        
        let personas = [];

        function renderizarTabla() {
            cuerpoTabla.innerHTML = ''; 
            
            personas.forEach((persona, index) => {
                const imc = (persona.peso / (persona.altura * persona.altura)).toFixed(2);
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${persona.nombre}</td>
                    <td>${persona.apellido}</td>
                    <td>${persona.edad}</td>
                    <td>${persona.altura}</td>
                    <td>${persona.peso}</td>
                    <td><strong>${imc}</strong></td>
                    <td><button class="btn-eliminar" data-index="${index}">Eliminar</button></td> 
                `;
                cuerpoTabla.appendChild(tr);
            });

            const botonesEliminar = document.querySelectorAll('.btn-eliminar');
            botonesEliminar.forEach(boton => {
                boton.addEventListener('click', (e) => {
                    const idx = e.target.getAttribute('data-index');
                    eliminarPersona(idx);
                });
            });
        }

        function eliminarPersona(index) {
            personas.splice(index, 1); 
            renderizarTabla();         
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault(); 
            
            const nuevaPersona = {
                nombre: document.getElementById('nombre').value,
                apellido: document.getElementById('apellido').value,
                edad: document.getElementById('edad').value,
                altura: parseFloat(document.getElementById('altura').value),
                peso: parseFloat(document.getElementById('peso').value)
            };
            
            personas.push(nuevaPersona); 
            renderizarTabla();          
            form.reset();               
        });
    </script>
</body>
</html>
